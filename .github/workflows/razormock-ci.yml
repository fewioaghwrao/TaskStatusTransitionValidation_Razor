name: Build and Test RazorMock

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TaskStatusTransitionValidation.RazorMock.sln

      - name: Build
        run: dotnet build TaskStatusTransitionValidation.RazorMock.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TaskStatusTransitionValidation.RazorMock.sln --configuration Release --no-build --verbosity normal